<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            text-align: center;
            padding: 50px;
            background-color: #333;
            color: white;
        }
        .portfolio {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .photo {
            margin: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
        }
        img {
            width: 300px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to My Photography Portfolio</h1>
        <p>Capturing moments, one click at a time.</p>
    </div>
    <div class="portfolio">
        <div class="photo">
            <img src="photo1.jpg" alt="Description of photo 1">
        </div>
        <div class="photo">
            <img src="photo2.jpg" alt="Description of photo 2">
        </div>
        <div class="photo">
            <img src="photo3.jpg" alt="Description of photo 3">
        </div>
        <!-- Add more photos as needed -->
    </div>
</body>
</html>
