<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h2>mengenal rowspan dan colspan</h2>
<table border="1" style="width: 100%;">
    <tr>
        <th rowspan="2">no</th>
        <th rowspan="2">nama</th>
        <th colspan="2">alamat</th>
        <th rowspan="2">hobby</th>
    </tr>
    <tr>
        <th>kota</th>
        <th>kodepos</th>
    </tr>
    <tr>
        <td>1</td>
        <td>irvansyah adi maulana</td>
        <td>45678</td>
        <td>kali putu</td>
        <td>main game</td>
    </tr>
    <tr>
        <td>2</td>
        <td>rapip</td>
        <td>45679</td>
        <td>kudus</td>
        <td>main game</td>
    </tr>
    <tr>
        <td>3</td>
        <td>abdillah</td>
        <td colspan="2" rowspan="2">belum di ketahui</td>
        <td>main</td>
    </tr>
    <tr>
        <td>4</td>
        <td>hifni</td>
        <td>main game</td>
    </tr>
</table>
</body>
</html>
